<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>AURA — Read Your Energy</title>
<meta name="description" content="Move your cursor. Let it flow. Discover the unique energy signature only you can create." />

<!-- Typography: Space Grotesk (display, geometric/technical) + Inter (body) + JetBrains Mono (instrument readouts) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Ambient animated gradient mesh, sits behind everything -->
  <div class="mesh" aria-hidden="true">
    <div class="blob blob-a"></div>
    <div class="blob blob-b"></div>
    <div class="blob blob-c"></div>
  </div>

  <!-- Full-screen canvas: live particle trail that follows the pointer -->
  <canvas id="bgCanvas" aria-hidden="true"></canvas>

  <!-- Custom cursor glow (desktop only) -->
  <div id="cursorGlow" aria-hidden="true"></div>

  <!-- Fine grain overlay for texture -->
  <div class="grain" aria-hidden="true"></div>

  <!-- ============== SCREEN 1: INTRO ============== -->
  <main id="introScreen" class="screen intro-screen">
    <p class="eyebrow">AN INSTRUMENT FOR READING ENERGY</p>
    <h1 class="hero-title">
      What does your<br/>
      <span class="grad-text">energy</span> look like?
    </h1>
    <p class="hero-sub">Move your cursor across the void. Every motion is unique — no one has ever moved exactly like you.</p>
    <p class="hint" id="hintText">✦&nbsp; move to begin&nbsp; ✦</p>
  </main>

  <!-- ============== HUD (visible while reading) ============== -->
  <section id="hud" class="hud glass" aria-live="polite">
    <div class="hud-ring-wrap">
      <svg class="hud-ring" viewBox="0 0 120 120">
        <circle class="ring-track" cx="60" cy="60" r="52"></circle>
        <circle id="ringProgress" class="ring-progress" cx="60" cy="60" r="52"></circle>
      </svg>
      <span id="ringLabel" class="ring-label">0%</span>
    </div>

    <div class="hud-stats">
      <div class="stat-row">
        <span class="stat-name">Chaos</span>
        <div class="stat-bar"><div id="barChaos" class="stat-fill fill-chaos"></div></div>
      </div>
      <div class="stat-row">
        <span class="stat-name">Flow</span>
        <div class="stat-bar"><div id="barFlow" class="stat-fill fill-flow"></div></div>
      </div>
      <div class="stat-row">
        <span class="stat-name">Reach</span>
        <div class="stat-bar"><div id="barReach" class="stat-fill fill-reach"></div></div>
      </div>
      <div class="stat-row">
        <span class="stat-name">Calm</span>
        <div class="stat-bar"><div id="barCalm" class="stat-fill fill-calm"></div></div>
      </div>
    </div>

    <button id="revealBtn" class="btn btn-primary" disabled>
      <span>Reveal My Aura</span>
    </button>
  </section>

  <!-- ============== SCREEN 2: REVEAL ============== -->
  <section id="revealScreen" class="screen reveal-screen">
    <div class="glass-card">
      <div class="card-canvas-wrap">
        <canvas id="auraCanvas" width="1080" height="1350"></canvas>
      </div>

      <div class="card-actions">
        <button id="downloadBtn" class="btn btn-ghost" title="Save your Aura as an image">
          <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M12 16l-6-6h4V3h4v7h4l-6 6zm-8 3h16v2H4v-2z"/></svg>
          Save Image
        </button>
        <button id="shareBtn" class="btn btn-ghost" title="Share on X">
          <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M18.9 2H22l-7.6 8.7L23.3 22h-7l-5.5-7.2L4.5 22H1.4l8.1-9.3L1 2h7.2l5 6.6L18.9 2zm-1.2 18h1.7L7.4 3.9H5.6L17.7 20z"/></svg>
          Share on X
        </button>
        <button id="copyBtn" class="btn btn-ghost" title="Copy link">
          <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M17 7h-4v2h4a3 3 0 010 6h-4v2h4a5 5 0 000-10zm-10 8H3a5 5 0 010-10h4v2H3a3 3 0 000 6h4v2zm-3-5h12v2H4v-2z"/></svg>
          Copy Link
        </button>
      </div>

      <button id="restartBtn" class="btn btn-text">Read again ↻</button>
    </div>
  </section>

  <!-- Toast for copy confirmation -->
  <div id="toast" class="toast"></div>

  <script src="script.js"></script>
</body>
</html>
